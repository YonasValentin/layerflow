name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install --global npm@11
      - run: npm ci
      - name: Verify tag matches the monorepo version
        run: |
          PKG_V="v$(node -p "require('./package.json').version")"
          if [ "$PKG_V" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json $PKG_V" >&2
            exit 1
          fi
      - run: npm run check
      - run: npm run release:check
      # Idempotent, per-package publish (see scripts/publish-changed.mjs): unchanged
      # packages are skipped instead of 403-ing as `npm publish --workspaces` did.
      - run: node ./scripts/publish-changed.mjs
